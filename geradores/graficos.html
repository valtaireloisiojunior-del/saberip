<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráficos Online | SEUIP.ORG</title>
<meta name="description" content="Crie gráficos de barras, pizza e linha com seus dados">
<style>:root{--primary:#00ff99;--primary-dark:#00cc77;--bg:#0d0d0d;--bg-card:#1a1a1a;--text:#fff;--text-secondary:#aaa;--border:#333;--radius:12px}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}.header{background:linear-gradient(180deg,rgba(0,255,153,0.1) 0%,transparent 100%);padding:1.5rem;text-align:center;border-bottom:1px solid var(--border)}.header a{color:var(--primary);font-size:1.5rem;font-weight:900;text-decoration:none;letter-spacing:-1px}.header p{color:var(--text-secondary);font-size:.9rem;margin-top:.5rem}.container{max-width:800px;margin:0 auto;padding:2rem 1rem;flex:1;width:100%}.tool-title{font-size:1.5rem;color:var(--primary);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}.tool-desc{color:var(--text-secondary);margin-bottom:1.5rem}.card{background:var(--bg-card);border-radius:var(--radius);padding:1.5rem;border:1px solid var(--border)}.input-group{margin-bottom:1rem}.input-group label{display:block;color:var(--primary);font-weight:600;margin-bottom:.5rem;font-size:.9rem}input,select,textarea{width:100%;padding:.8rem 1rem;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;font-family:inherit}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,255,153,0.1)}.btn{background:var(--primary);color:var(--bg);border:none;border-radius:8px;padding:.8rem 1.5rem;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:.5rem}.btn:hover{background:var(--primary-dark);transform:translateY(-2px)}.btn-secondary{background:rgba(0,255,153,0.1);color:var(--primary);border:1px solid rgba(0,255,153,0.3)}.btn-secondary:hover{background:rgba(0,255,153,0.2)}.actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem}.result{margin-top:1rem;padding:1rem;background:rgba(0,255,153,0.05);border:1px solid rgba(0,255,153,0.2);border-radius:8px;font-family:'Courier New',monospace;word-break:break-all;display:none}.result.show{display:block}.footer{text-align:center;padding:1.5rem;border-top:1px solid var(--border);color:var(--text-secondary);font-size:.85rem}.footer a{color:var(--primary);text-decoration:none}</style>
</head>
<body>
<header class="header"><a href="../index.html">SEUIP.ORG</a><p>Ferramentas online grátis</p></header>
<main class="container">
<h1 class="tool-title">📊 Gráficos Online</h1>
<p class="tool-desc">Crie gráficos de barras, pizza e linha com seus dados</p>
<div class="card">
<div class="input-group"><label>Dados (rótulo:valor, um por linha)</label><textarea id="dados" rows="5" placeholder="Janeiro: 30&#10;Fevereiro: 45&#10;Março: 25"></textarea></div>
<div class="input-group"><label>Tipo</label><select id="tipoGraf"><option value="bar">Barras</option><option value="pie">Pizza</option><option value="line">Linha</option></select></div>
<div class="actions"><button class="btn" onclick="desenhar()">📊 Gerar Gráfico</button></div>
<canvas id="canvas" style="margin-top:1.5rem;max-width:100%;background:var(--bg-card);border-radius:8px;border:1px solid var(--border)"></canvas>
</div>
</main>
<footer class="footer"><p>© 2024 <a href="../index.html">SEUIP.ORG</a> | <a href="../sobre.html">Sobre</a> | <a href="../privacidade.html">Privacidade</a></p></footer>
<script>
function desenhar(){const linhas=document.getElementById("dados").value.split("\n").filter(l=>l.includes(":"));const dados=linhas.map(l=>{const[p,v]=l.split(":");return{label:p.trim(),value:+v.trim()}});if(!dados.length)return;const c=document.getElementById("canvas");const ctx=c.getContext("2d");const w=600,h=400;c.width=w;c.height=h;ctx.clearRect(0,0,w,h);const tipo=document.getElementById("tipoGraf").value;const cores=["#00ff99","#00ccff","#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff9f45","#c9b1ff"];const max=Math.max(...dados.map(d=>d.value));
if(tipo==="bar"){const bw=w/(dados.length*2);dados.forEach((d,i)=>{const bh=(d.value/max)*(h-60);ctx.fillStyle=cores[i%cores.length];ctx.fillRect(i*bw*2+30,h-bh-30,bw,bh);ctx.fillStyle="#fff";ctx.font="12px sans-serif";ctx.textAlign="center";ctx.fillText(d.label,i*bw*2+30+bw/2,h-10);ctx.fillText(d.value,i*bw*2+30+bw/2,h-bh-35);});}
else if(tipo==="pie"){let start=0;const total=dados.reduce((s,d)=>s+d.value,0);dados.forEach((d,i)=>{const slice=(d.value/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(w/2,h/2);ctx.arc(w/2,h/2,120,start,start+slice);ctx.fillStyle=cores[i%cores.length];ctx.fill();start+=slice;});}
else{ctx.beginPath();const step=(w-60)/(dados.length-1);dados.forEach((d,i)=>{const x=30+i*step;const y=h-30-(d.value/max)*(h-60);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);ctx.fillStyle="#fff";ctx.font="12px sans-serif";ctx.fillText(d.label,x-15,h-10);ctx.fillText(d.value,x-10,y-10);});ctx.strokeStyle="#00ff99";ctx.lineWidth=2;ctx.stroke();}}
desenhar();
</script>
</body>
</html>
